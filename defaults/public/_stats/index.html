<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      @font-face {
        font-family: "InterVariable";
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url("/fonts/intervariable.woff2") format("woff2");
      }
      @font-face {
        font-family: "JetBrains Mono";
        font-style: normal;
        font-weight: 100 800;
        font-display: swap;
        src: url("/fonts/jetbrainsmono.woff2") format("woff2");
      }
      :root {
        color-scheme: light dark;
        --bg: #f9fafb;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --soft: #f3f4f6;
        --brand: #0f766e;
      }
      :root[data-theme="light"] {
        color-scheme: light;
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #101418;
        --panel: #171d22;
        --text: #eef4f3;
        --muted: #a8b3b1;
        --border: #2d3836;
        --soft: #202a2f;
        --brand: #4fd1c5;
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme]) {
          --bg: #101418;
          --panel: #171d22;
          --text: #eef4f3;
          --muted: #a8b3b1;
          --border: #2d3836;
          --soft: #202a2f;
          --brand: #4fd1c5;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "InterVariable", Inter, system-ui, sans-serif;
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }
      main {
        width: min(1200px, calc(100vw - 2rem));
        margin: 3rem auto;
      }
      header {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: start;
        margin-bottom: 2rem;
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1;
      }
      .brand-mark {
        display: inline-flex;
        width: min(42vw, 320px);
        flex: 0 0 auto;
      }
      .brand-mark img {
        display: block;
        width: 100%;
        height: auto;
      }
      .muted {
        color: var(--muted);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        margin: 1.5rem 0;
      }
      .card {
        appearance: none;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        padding: 1rem;
        background: var(--panel);
        color: inherit;
        cursor: pointer;
        font: inherit;
        text-align: left;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }
      .card:hover {
        border-color: var(--brand);
        box-shadow: 0 0.6rem 1.5rem rgb(15 118 110 / 0.12);
        transform: translateY(-1px);
      }
      .card:focus-visible {
        outline: 3px solid color-mix(in srgb, var(--brand) 35%, transparent);
        outline-offset: 2px;
      }
      .card[aria-pressed="true"] {
        border-color: var(--brand);
        box-shadow: inset 0 0 0 1px var(--brand);
      }
      .metric {
        font-size: 2rem;
        font-weight: 750;
      }
      input {
        width: 100%;
        padding: 0.8rem 1rem;
        border-radius: 0.5rem;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        font: inherit;
        margin: 1rem 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
        table-layout: fixed;
      }
      th,
      td {
        text-align: left;
        padding: 0.8rem;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-size: 0.85rem;
        font-weight: 650;
      }
      code {
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
      }
      .tag {
        display: inline-block;
        padding: 0.15rem 0.5rem;
        border-radius: 999px;
        background: var(--soft);
        margin: 0.1rem;
        font-size: 0.8rem;
      }
      .state {
        font-weight: 700;
        text-transform: capitalize;
      }
      .ok {
        color: #067a36;
      }
      .warn {
        color: #9a4f00;
      }
      .bad {
        color: #b42318;
      }
      a {
        color: inherit;
      }
      .slug-cell {
        width: 9rem;
      }
      .state-cell {
        width: 8rem;
      }
      .title-cell {
        width: 20rem;
      }
      .target-cell {
        max-width: 60ch;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .owner-cell {
        width: 6rem;
      }
      .tags-cell {
        width: 13rem;
      }
      .expires-cell {
        width: 7rem;
      }
      footer {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
        justify-content: space-between;
        margin-top: 2rem;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .download-link {
        color: var(--brand);
        font-weight: 700;
      }
      .filter-summary {
        min-height: 1.2rem;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .filter-summary strong {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Dashboard</h1>
        </div>
        <a class="brand-mark" href="https://vanityURLs.link" target="_blank" rel="noreferrer" aria-label="VanityURLs">
          <img src="/logo.svg" alt="VanityURLs" />
        </a>
      </header>

      <section class="grid" id="metrics"></section>

      <input id="search" type="search" placeholder="Search path, target, title, description, owner, tags…" />
      <div class="filter-summary" id="filter-summary" aria-live="polite"></div>

      <table>
        <thead>
          <tr>
            <th class="slug-cell">Slug</th>
            <th class="state-cell">State</th>
            <th class="title-cell">Title</th>
            <th class="target-cell">Target</th>
            <th class="owner-cell">Owner</th>
            <th class="tags-cell">Tags</th>
            <th class="expires-cell">Expires</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>

      <footer>
        <span id="generated"></span>
        <a class="download-link" href="/_stats/api/v8s.json" download="v8s.json">Download v8s.json</a>
      </footer>
    </main>

    <script>
      const rowsEl = document.getElementById("rows");
      const metricsEl = document.getElementById("metrics");
      const searchEl = document.getElementById("search");
      const filterSummaryEl = document.getElementById("filter-summary");
      const generatedEl = document.getElementById("generated");

      let allLinks = [];
      let registry = null;
      const activeStates = new Set();

      main().catch((error) => {
        rowsEl.innerHTML = `<tr><td colspan="7">Failed to load registry: ${escapeHtml(error.message)}</td></tr>`;
      });

      async function main() {
        const response = await fetch("/_stats/api/v8s.json", { cache: "no-store" });
        registry = await response.json();
        allLinks = flattenRegistry(registry);
        generatedEl.innerHTML = renderGeneratedFooter(registry);
        renderMetrics(allLinks);
        applyFilters();
      }

      searchEl.addEventListener("input", () => {
        applyFilters();
      });

      metricsEl.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-filter-state]");
        if (!button) return;

        const state = button.dataset.filterState;
        if (state === "total") {
          activeStates.clear();
          searchEl.value = "";
        } else if (activeStates.has(state)) {
          activeStates.delete(state);
        } else {
          activeStates.add(state);
        }

        renderMetrics(allLinks);
        applyFilters();
      });

      function flattenRegistry(registry) {
        if (Array.isArray(registry.links)) {
          return registry.links
            .map((link) => ({ ...link, path: link.slug || "" }))
            .sort((a, b) => a.path.localeCompare(b.path));
        }

        const root = registry.routes && typeof registry.routes === "object" ? registry.routes : registry.tree;
        const result = [];

        function walk(node, parts) {
          if (!node || typeof node !== "object") return;

          if (node.link && typeof node.link === "object") {
            result.push({ ...node.link, path: node.link.slug || parts.join("/") });
          }

          if (typeof node.target === "string") {
            result.push({ path: parts.join("/"), ...node });
            return;
          }

          for (const [key, child] of Object.entries(node.children || node)) {
            if (
              [
                "schema_version",
                "generated_at",
                "generated_timezone",
                "generated_git",
                "default_state",
                "routing",
                "routes",
                "tree",
                "links",
                "link"
              ].includes(key)
            )
              continue;
            walk(child, [...parts, key]);
          }
        }

        walk(root, []);
        return result.sort((a, b) => a.path.localeCompare(b.path));
      }

      function effectiveState(link) {
        if (link.expires_at && new Date(link.expires_at).getTime() < Date.now()) return "expired";
        return link.state || registry?.default_state || "permanent";
      }

      function renderMetrics(links) {
        const counts = { total: links.length };
        for (const link of links) {
          const state = effectiveState(link);
          counts[state] = (counts[state] || 0) + 1;
        }

        const items = ["total", "permanent", "ephemeral", "expired", "disabled", "maintenance", "deactivated"];
        metricsEl.innerHTML = items
          .map(
            (key) => `
        <button class="card" type="button" data-filter-state="${escapeAttr(key)}" aria-pressed="${key !== "total" && activeStates.has(key) ? "true" : "false"}" title="${key === "total" ? "Clear filters" : `Filter by ${label(key)}`}">
          <div class="metric">${counts[key] || 0}</div>
          <div class="muted">${label(key)}</div>
        </button>
      `
          )
          .join("");
      }

      function applyFilters() {
        const q = searchEl.value.trim().toLowerCase();
        const filtered = allLinks.filter((link) => {
          if (activeStates.size && !activeStates.has(effectiveState(link))) return false;
          if (!q) return true;
          return JSON.stringify(link).toLowerCase().includes(q);
        });

        renderRows(filtered);
        renderFilterSummary(filtered.length, q);
      }

      function renderFilterSummary(count, query) {
        const filters = [];
        if (query) filters.push(`search <strong>${escapeHtml(query)}</strong>`);
        if (activeStates.size) {
          filters.push(`state <strong>${[...activeStates].map(label).join(" or ")}</strong>`);
        }

        filterSummaryEl.innerHTML = filters.length
          ? `${count} matching route${count === 1 ? "" : "s"} where ${filters.join(" and ")}`
          : "";
      }

      function renderRows(links) {
        if (!links.length) {
          rowsEl.innerHTML = `<tr><td colspan="7" class="muted">No matching routes.</td></tr>`;
          return;
        }

        rowsEl.innerHTML = links
          .map((link) => {
            const state = effectiveState(link);
            return `
          <tr>
            <td class="slug-cell"><code>/${escapeHtml(link.path)}</code></td>
            <td class="state-cell"><span class="state ${stateClass(state)}">${escapeHtml(state)}</span></td>
            <td class="title-cell"><strong>${escapeHtml(link.title || "—")}</strong><br><span class="muted">${escapeHtml(link.description || "")}</span></td>
            <td class="target-cell"><a href="${escapeAttr(link.target)}" target="_blank" rel="noreferrer">${wrapLongText(link.target, 60)}</a></td>
            <td class="owner-cell">${escapeHtml(link.owner || "—")}</td>
            <td class="tags-cell">${Array.isArray(link.tags) ? link.tags.map((t) => `<span class="tag">${escapeHtml(t)}</span>`).join("") : "—"}</td>
            <td class="expires-cell">${escapeHtml(link.expires_at || "—")}</td>
          </tr>
        `;
          })
          .join("");
      }

      function label(value) {
        return value.replace(/_/g, " ").replace(/^./, (c) => c.toUpperCase());
      }

      function renderGeneratedFooter(registry) {
        const generated = formatGeneratedFooter(registry?.generated_at, registry?.generated_timezone);
        const commit = String(registry?.generated_git?.commit || "").trim();
        const commitUrl = String(registry?.generated_git?.commit_url || "").trim();
        if (!commit) return escapeHtml(generated);

        const shortCommit = commit.slice(0, 7);
        const commitLabel = `commit ${shortCommit}`;
        const commitHtml = commitUrl
          ? `<a href="${escapeAttr(commitUrl)}" target="_blank" rel="noreferrer">${escapeHtml(commitLabel)}</a>`
          : escapeHtml(commitLabel);

        return `${escapeHtml(generated)} / ${commitHtml}`;
      }

      function formatGeneratedFooter(value, timezone) {
        if (!value) return "View of links";

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "View of links";

        const displayTimezone = validTimezone(timezone) ? timezone : undefined;
        const formatted = date.toLocaleString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
          second: "2-digit",
          timeZoneName: "short",
          ...(displayTimezone ? { timeZone: displayTimezone } : {})
        });

        return `View of links, generated ${formatted}`;
      }

      function wrapLongText(value, size = 60) {
        const text = String(value ?? "");
        const chunks = [];
        for (let index = 0; index < text.length; index += size) {
          chunks.push(escapeHtml(text.slice(index, index + size)));
        }
        return chunks.join("<wbr>");
      }

      function validTimezone(timezone) {
        if (!timezone) return false;
        try {
          new Intl.DateTimeFormat(undefined, { timeZone: timezone }).format(new Date());
          return true;
        } catch {
          return false;
        }
      }

      function stateClass(state) {
        if (["permanent", "ephemeral"].includes(state)) return "ok";
        if (["expired", "disabled", "maintenance"].includes(state)) return "warn";
        return "bad";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }
    </script>
  </body>
</html>
