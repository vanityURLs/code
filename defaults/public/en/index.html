<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VanityURLs short links</title>
  <script>
    (function () {
      var pathname = window.location.pathname || "/";
      if (pathname === "/") return;

      try {
        window.__initialInvalidRedirectKey = decodeURIComponent(pathname.replace(/^\//, ""));
      } catch {
        window.__initialInvalidRedirectKey = pathname.replace(/^\//, "");
      }
    })();
  </script>
  <link rel="stylesheet" href="/style.css?v=20260504">
</head>
<body>
  <main class="page-shell">
    <section class="search-home" aria-labelledby="brand-title">
      <a class="wordmark" href="https://vanityurls.link/" target="_blank" rel="noreferrer" aria-label="VanityURLs">
        <h1 id="brand-title"><span>Vanity</span><span>URLs</span></h1>
      </a>

      <form class="redirect-form" onsubmit="redirect(event)">
        <label class="sr-only" for="redirectKey">Short link</label>
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="m21 21-4.35-4.35m1.1-5.15a6.25 6.25 0 1 1-12.5 0 6.25 6.25 0 0 1 12.5 0Z" />
          </svg>
          <input id="redirectKey" type="text" maxlength="99" autocomplete="off" autocapitalize="none" spellcheck="false" inputmode="url" placeholder="Type a short link, redirected by VanityURLs engine" required>
          <script>
            (function () {
              var initialInvalidKey = window.__initialInvalidRedirectKey;
              if (!initialInvalidKey) return;

              var input = document.getElementById("redirectKey");
              var form = document.querySelector(".redirect-form");

              if (input) input.value = initialInvalidKey;
              if (form) form.classList.add("has-value");
            })();
          </script>
          <button type="submit" aria-label="Open short link">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M5 12h12M13 6l6 6-6 6" />
            </svg>
          </button>
        </div>
      </form>

      <a class="redirected-badge" href="https://vanityURLs.link" target="_blank" rel="noreferrer" aria-label="VanityURLs">
        <picture>
          <source srcset="/v8s-redirected-dark.svg" media="(prefers-color-scheme: dark)">
          <img src="/v8s-redirected.svg" alt="V8S redirected by VanityURLs">
        </picture>
      </a>

      <nav class="page-links" aria-label="Instance pages">
        <a href="/privacy">Privacy</a>
        <a href="/terms">Terms</a>
        <a href="/abuse">Abuse</a>
        <a href="/security">Security</a>
      </nav>

    </section>
  </main>

  <noscript>
    <p>JavaScript is disabled</p>
    <p><span>Open short links directly in the address bar, for example:</span> <a href="/test">/test</a></p>
  </noscript>

  <script src="/script.js"></script>
</body>
</html>
