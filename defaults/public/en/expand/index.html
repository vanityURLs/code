<!doctype html>
<html lang="en-CA">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Expand short link | dicai.re</title>
  <meta name="description" content="Preview the destination of a dicai.re short link before opening it">
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/style.css?v=20260504">
  <style>
    .expand-result {
      display: none;
      width: min(100%, 620px);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 18px 20px;
      box-shadow: var(--shadow);
      text-align: left;
    }

    .expand-result.is-visible {
      display: block;
    }

    .expand-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .expand-target {
      margin: 0;
      overflow-wrap: anywhere;
      color: var(--text);
      font-size: 1rem;
      line-height: 1.55;
    }

    .expand-target a {
      color: var(--brand);
      font-weight: 650;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .expand-meta {
      margin: 12px 0 0;
      color: var(--muted);
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.82rem;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="search-home" aria-labelledby="brand-title">
      <a class="wordmark" href="/" aria-label="dicai.re">
        <h1 id="brand-title"><span>Dicai.</span><span>re</span></h1>
      </a>

      <form class="redirect-form" id="expandForm">
        <label class="sr-only" for="expandKey">Short link</label>
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="m21 21-4.35-4.35m1.1-5.15a6.25 6.25 0 1 1-12.5 0 6.25 6.25 0 0 1 12.5 0Z" />
          </svg>
          <input id="expandKey" type="text" maxlength="99" autocomplete="off" autocapitalize="none" spellcheck="false" inputmode="url" placeholder="Type a short link to preview its destination" required>
          <button type="submit" aria-label="Expand short link">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M5 12h12M13 6l6 6-6 6" />
            </svg>
          </button>
        </div>
      </form>

      <div class="expand-result" id="expandResult" aria-live="polite"></div>

      <a class="redirected-badge" href="https://vanityURLs.link" target="_blank" rel="noreferrer" aria-label="VanityURLs">
        <picture>
          <source srcset="/v8s-redirected-dark.svg" media="(prefers-color-scheme: dark)">
          <img src="/v8s-redirected.svg" alt="V8S redirected by VanityURLs">
        </picture>
      </a>

      <nav class="page-links" aria-label="Instance pages">
        <a href="/privacy">Privacy</a>
        <a href="/terms">Terms</a>
        <a href="/abuse">Abuse</a>
        <a href="/security">Security</a>
      </nav>

    </section>
  </main>

  <script>
    const form = document.getElementById("expandForm");
    const input = document.getElementById("expandKey");
    const result = document.getElementById("expandResult");
    const labels = {
      empty: "Enter a short link to preview its destination",
      miss: "No matching short link was found",
      notRedirecting: "This short link is not currently redirecting",
      error: "Unable to load short link data",
      preview: "Preview",
      destination: "Destination"
    };

    let registryPromise = null;

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const slug = normalizeSlug(input.value);
      input.value = slug;
      syncFormState();

      if (!slug) {
        renderMessage(labels.empty);
        return;
      }

      try {
        const registry = await loadRegistry();
        const resolved = resolveLink(registry.links || [], slug);

        if (!resolved) {
          renderMessage(labels.miss);
          trackExpand(slug, "", "", "miss");
          return;
        }

        const state = effectiveState(resolved.link, registry);
        const target = resolveTarget(registry.routing?.[state], resolved.link, resolved.splat);
        if (!target) {
          renderMessage(labels.notRedirecting);
          trackExpand(slug, state, "", "not-redirecting");
          return;
        }

        renderTarget(slug, target, state);
        trackExpand(slug, state, target, "resolved");
      } catch {
        renderMessage(labels.error);
        trackExpand(slug, "", "", "error");
      }
    });

    input.addEventListener("input", (event) => {
      event.target.value = event.target.value.replace(/[^a-zA-Z0-9\-_\/]/g, "");
      syncFormState();
    });

    input.addEventListener("paste", (event) => {
      event.preventDefault();
      const pasted = (event.clipboardData || window.clipboardData).getData("text");
      input.value = normalizeSlug(pasted);
      syncFormState();
    });

    syncFormState();

    function syncFormState() {
      form.classList.toggle("has-value", input.value.trim().length > 0);
    }

    function normalizeSlug(value) {
      return String(value || "")
        .trim()
        .replace(/^https?:\/\/[^/]+\//i, "")
        .replace(/^\/+/, "")
        .replace(/\/+$/, "")
        .replace(/\/{2,}/g, "/")
        .replace(/[^a-zA-Z0-9\-_\/]/g, "")
        .slice(0, 99);
    }

    async function loadRegistry() {
      if (!registryPromise) {
        registryPromise = fetch("/_stats/api/v8s.json", { cache: "no-store" }).then((response) => {
          if (!response.ok) throw new Error("Unable to load registry");
          return response.json();
        });
      }

      return registryPromise;
    }

    function resolveLink(links, slug) {
      const exact = links.find((link) => (link.match || "exact") === "exact" && link.slug === slug);
      if (exact) return { link: exact, splat: "" };

      const splats = links
        .filter((link) => link.match === "splat")
        .sort((a, b) => b.slug.length - a.slug.length);

      for (const link of splats) {
        if (slug.startsWith(`${link.slug}/`)) {
          return { link, splat: slug.slice(link.slug.length + 1) };
        }
      }

      return null;
    }

    function effectiveState(link, registry) {
      if (link.expires_at) {
        const expiry = new Date(link.expires_at);
        if (!Number.isNaN(expiry.getTime()) && expiry < new Date()) return "expired";
      }

      return link.state || registry.default_state || "permanent";
    }

    function resolveTarget(route, link, splat) {
      if (!route || route.type !== "redirect" || route.target !== "link.target") return "";

      const target = route.target === "link.target" ? link.target : route.target;
      return splat ? target.replaceAll(":splat", splat) : target;
    }

    function renderMessage(message) {
      result.classList.add("is-visible");
      result.innerHTML = `
        <p class="expand-label">${escapeHtml(labels.preview)}</p>
        <p class="expand-target">${escapeHtml(message)}</p>
      `;
    }

    function renderTarget(slug, target, state) {
      result.classList.add("is-visible");
      result.innerHTML = `
        <p class="expand-label">${escapeHtml(labels.destination)}</p>
        <p class="expand-target"><a href="${escapeAttr(target)}" target="_blank" rel="noreferrer">${escapeHtml(target)}</a></p>
        <p class="expand-meta">/${escapeHtml(slug)} · ${escapeHtml(state)}</p>
      `;
    }

    function trackExpand(slug, state, target, result) {
      const body = JSON.stringify({ slug, state, target, result });

      if (navigator.sendBeacon) {
        const blob = new Blob([body], { type: "application/json" });
        navigator.sendBeacon("/_analytics/expand", blob);
        return;
      }

      fetch("/_analytics/expand", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body,
        keepalive: true
      }).catch(() => {});
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
