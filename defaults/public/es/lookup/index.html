<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Consultar enlace corto | VanityURLs</title>
    <meta name="description" content="Previsualiza el destino de un enlace corto de VanityURLs antes de abrirlo" />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/style.css?v=20260601" />
    <style>
      .lookup-result {
        display: none;
        width: min(100%, 620px);
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        padding: 18px 20px;
        box-shadow: var(--shadow);
        text-align: left;
      }

      .lookup-result.is-visible {
        display: block;
      }

      .lookup-label {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .lookup-target {
        margin: 0;
        overflow-wrap: anywhere;
        color: var(--text);
        font-size: 1rem;
        line-height: 1.55;
      }

      .lookup-target a {
        color: var(--brand);
        font-weight: 650;
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }

      .lookup-meta {
        margin: 12px 0 0;
        color: var(--muted);
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.82rem;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <section class="search-home" aria-labelledby="brand-title">
        <a class="wordmark" href="/" aria-label="VanityURLs">
          <h1 id="brand-title"><span>Vanity</span><span>URLs</span></h1>
        </a>

        <form class="redirect-form" id="lookupForm">
          <label class="sr-only" for="lookupKey">Enlace corto</label>
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="m21 21-4.35-4.35m1.1-5.15a6.25 6.25 0 1 1-12.5 0 6.25 6.25 0 0 1 12.5 0Z" />
            </svg>
            <input
              id="lookupKey"
              type="text"
              maxlength="99"
              autocomplete="off"
              autocapitalize="none"
              spellcheck="false"
              inputmode="url"
              placeholder="Escribe un enlace corto para previsualizar su destino"
              required
            />
            <button type="submit" aria-label="Consultar enlace corto">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M5 12h12M13 6l6 6-6 6" />
              </svg>
            </button>
          </div>
        </form>

        <div class="lookup-result" id="lookupResult" aria-live="polite"></div>

        <a
          class="redirected-badge"
          href="https://vanityURLs.link"
          target="_blank"
          rel="noreferrer"
          aria-label="VanityURLs"
        >
          <picture>
            <source srcset="/es/v8s-redirected-dark.svg" media="(prefers-color-scheme: dark)" />
            <img src="/es/v8s-redirected.svg" alt="V8S redirigido por VanityURLs" />
          </picture>
        </a>
      </section>
    </main>

    <script>
      const form = document.getElementById("lookupForm");
      const input = document.getElementById("lookupKey");
      const result = document.getElementById("lookupResult");
      const labels = {
        empty: "Escribe un enlace corto para previsualizar su destino",
        miss: "No se encontró ningún enlace corto coincidente",
        notRedirecting: "Este enlace corto no redirige actualmente",
        error: "No se pudieron cargar los datos de enlaces cortos",
        preview: "Vista previa",
        destination: "Destino del enlace"
      };

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const slug = normalizeSlug(input.value);
        input.value = slug;
        syncFormState();

        if (!slug) {
          renderMessage(labels.empty);
          return;
        }

        try {
          const lookup = await lookupSlug(slug);

          if (lookup.result === "miss") {
            renderMessage(labels.miss);
            trackLookup(slug, "", "", "miss");
            return;
          }

          const state = lookup.state || "";
          if (lookup.result !== "resolved" || !lookup.target) {
            renderMessage(labels.notRedirecting);
            trackLookup(slug, state, "", "not-redirecting");
            return;
          }

          renderTarget(slug, lookup.target, state);
          trackLookup(slug, state, lookup.target, "resolved");
        } catch {
          renderMessage(labels.error);
          trackLookup(slug, "", "", "error");
        }
      });

      input.addEventListener("input", (event) => {
        event.target.value = event.target.value.replace(/[^a-zA-Z0-9\-_\/]/g, "");
        syncFormState();
      });

      input.addEventListener("paste", (event) => {
        event.preventDefault();
        const pasted = (event.clipboardData || window.clipboardData).getData("text");
        input.value = normalizeSlug(pasted);
        syncFormState();
      });

      syncFormState();

      function syncFormState() {
        form.classList.toggle("has-value", input.value.trim().length > 0);
      }

      function normalizeSlug(value) {
        return String(value || "")
          .trim()
          .replace(/^https?:\/\/[^/]+\//i, "")
          .replace(/^\/+/, "")
          .replace(/\/+$/, "")
          .replace(/\/{2,}/g, "/")
          .replace(/[^a-zA-Z0-9\-_\/]/g, "")
          .slice(0, 99);
      }

      async function lookupSlug(slug) {
        const response = await fetch("/_lookup?slug=" + encodeURIComponent(slug), { cache: "no-store" });
        if (!response.ok) throw new Error("Unable to load lookup data");
        return response.json();
      }

      function renderMessage(message) {
        result.classList.add("is-visible");
        result.innerHTML = `
        <p class="lookup-label">${escapeHtml(labels.preview)}</p>
        <p class="lookup-target">${escapeHtml(message)}</p>
      `;
      }

      function renderTarget(slug, target, state) {
        result.classList.add("is-visible");
        result.innerHTML = `
        <p class="lookup-label">${escapeHtml(labels.destination)}</p>
        <p class="lookup-target"><a href="${escapeAttr(target)}" target="_blank" rel="noreferrer">${escapeHtml(target)}</a></p>
        <p class="lookup-meta">/${escapeHtml(slug)} · ${escapeHtml(state)}</p>
      `;
      }

      function trackLookup(slug, state, target, result) {
        const body = JSON.stringify({ slug, state, target, result });

        if (navigator.sendBeacon) {
          const blob = new Blob([body], { type: "application/json" });
          navigator.sendBeacon("/_analytics/lookup", blob);
          return;
        }

        fetch("/_analytics/lookup", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body,
          keepalive: true
        }).catch(() => {});
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }
    </script>
  </body>
</html>
