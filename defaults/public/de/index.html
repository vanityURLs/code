<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VanityURLs-Kurzlinks</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (function () {
        var pathname = window.location.pathname || "/";
        if (pathname === "/" || /\/index\.html$/i.test(pathname)) return;

        try {
          window.__initialInvalidRedirectKey = decodeURIComponent(pathname.replace(/^\//, ""));
        } catch {
          window.__initialInvalidRedirectKey = pathname.replace(/^\//, "");
        }
      })();
    </script>
    <link rel="stylesheet" href="/style.css?v=20260601" />
  </head>
  <body>
    <main class="page-shell">
      <section class="search-home" aria-labelledby="brand-title">
        <a class="wordmark" href="https://vanityurls.link/" target="_blank" rel="noreferrer" aria-label="VanityURLs">
          <h1 id="brand-title"><span>Vanity</span><span>URLs</span></h1>
        </a>

        <form class="redirect-form" onsubmit="redirect(event)">
          <label class="sr-only" for="redirectKey">Kurzlink</label>
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="m21 21-4.35-4.35m1.1-5.15a6.25 6.25 0 1 1-12.5 0 6.25 6.25 0 0 1 12.5 0Z" />
            </svg>
            <input
              id="redirectKey"
              type="text"
              maxlength="99"
              autocomplete="off"
              autocapitalize="none"
              spellcheck="false"
              inputmode="url"
              placeholder="Kurzlink eingeben, weitergeleitet durch die VanityURLs-Engine"
              required
            />
            <script>
              (function () {
                var initialInvalidKey = window.__initialInvalidRedirectKey;
                if (!initialInvalidKey) return;

                var input = document.getElementById("redirectKey");
                var form = document.querySelector(".redirect-form");

                if (input) input.value = initialInvalidKey;
                if (form) form.classList.add("has-value");
              })();
            </script>
            <button type="submit" aria-label="Kurzlink öffnen">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M5 12h12M13 6l6 6-6 6" />
              </svg>
            </button>
          </div>
        </form>

        <a
          class="redirected-badge"
          href="https://vanityURLs.link"
          target="_blank"
          rel="noreferrer"
          aria-label="VanityURLs"
        >
          <picture>
            <source srcset="/de/v8s-redirected-dark.svg" media="(prefers-color-scheme: dark)" />
            <img src="/de/v8s-redirected.svg" alt="V8S weitergeleitet von VanityURLs" />
          </picture>
        </a>
      </section>
    </main>

    <noscript>
      <p>JavaScript ist deaktiviert</p>
      <p><span>Öffne Kurzlinks direkt in der Adressleiste, zum Beispiel:</span> <a href="/test">/test</a></p>
    </noscript>

    <script src="/script.js"></script>
  </body>
</html>
