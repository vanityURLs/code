<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>vanityURLs.link localized logo check</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f2;
        color: #1b1b18;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      header {
        padding: 28px clamp(18px, 4vw, 48px) 18px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(24px, 3vw, 38px);
        font-weight: 700;
        letter-spacing: 0;
      }

      p {
        max-width: 780px;
        margin: 0;
        color: #55554d;
        line-height: 1.5;
      }

      main {
        display: grid;
        gap: 28px;
        padding: 0 clamp(18px, 4vw, 48px) 48px;
      }

      section {
        display: grid;
        gap: 14px;
      }

      h2 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0;
      }

      .surface {
        display: grid;
        gap: 22px;
        padding: 24px;
        overflow-x: auto;
        border: 1px solid #d8d6ce;
        background: #fffdfa;
      }

      .surface.dark {
        border-color: #282825;
        background: #11110f;
        color: #f2f0e8;
      }

      .size-group {
        display: grid;
        gap: 12px;
        min-width: min-content;
      }

      .size-label {
        font-size: 14px;
        font-weight: 700;
        color: inherit;
      }

      .logo-grid {
        display: grid;
        grid-template-columns: repeat(5, max-content);
        gap: 18px;
        align-items: start;
      }

      figure {
        display: grid;
        gap: 8px;
        margin: 0;
      }

      figcaption {
        font-size: 12px;
        color: #66665e;
      }

      .dark figcaption {
        color: #c6c2b5;
      }

      img {
        display: block;
        height: auto;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: transparent;
      }

      .dark img {
        border-color: rgba(255, 255, 255, 0.12);
      }

      .w240 {
        width: 240px;
      }

      .w360 {
        width: 360px;
      }

      .w720 {
        width: 720px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Localized logo comparison</h1>
      <p>Light and dark exports shown at 240px, 360px, and 720px. German is included as the long-string stress test against the same shared frame.</p>
    </header>
    <main>
      <section aria-labelledby="light-heading">
        <h2 id="light-heading">Light SVGs</h2>
        <div class="surface">
          <div class="size-group">
            <div class="size-label">240px</div>
            <div class="logo-grid">
              <figure><img class="w240" src="vanityURLs-link redirected-en-9.svg" alt="English light logo at 240px"><figcaption>en</figcaption></figure>
              <figure><img class="w240" src="vanityURLs-link redirected-fr-9.svg" alt="French light logo at 240px"><figcaption>fr</figcaption></figure>
              <figure><img class="w240" src="vanityURLs-link redirected-es-9.svg" alt="Spanish light logo at 240px"><figcaption>es</figcaption></figure>
              <figure><img class="w240" src="vanityURLs-link redirected-it-9.svg" alt="Italian light logo at 240px"><figcaption>it</figcaption></figure>
              <figure><img class="w240" src="vanityURLs-link redirected-de-9.svg" alt="German light logo at 240px"><figcaption>de</figcaption></figure>
            </div>
          </div>
          <div class="size-group">
            <div class="size-label">360px</div>
            <div class="logo-grid">
              <figure><img class="w360" src="vanityURLs-link redirected-en-9.svg" alt="English light logo at 360px"><figcaption>en</figcaption></figure>
              <figure><img class="w360" src="vanityURLs-link redirected-fr-9.svg" alt="French light logo at 360px"><figcaption>fr</figcaption></figure>
              <figure><img class="w360" src="vanityURLs-link redirected-es-9.svg" alt="Spanish light logo at 360px"><figcaption>es</figcaption></figure>
              <figure><img class="w360" src="vanityURLs-link redirected-it-9.svg" alt="Italian light logo at 360px"><figcaption>it</figcaption></figure>
              <figure><img class="w360" src="vanityURLs-link redirected-de-9.svg" alt="German light logo at 360px"><figcaption>de</figcaption></figure>
            </div>
          </div>
          <div class="size-group">
            <div class="size-label">720px</div>
            <div class="logo-grid">
              <figure><img class="w720" src="vanityURLs-link redirected-en-9.svg" alt="English light logo at 720px"><figcaption>en</figcaption></figure>
              <figure><img class="w720" src="vanityURLs-link redirected-fr-9.svg" alt="French light logo at 720px"><figcaption>fr</figcaption></figure>
              <figure><img class="w720" src="vanityURLs-link redirected-es-9.svg" alt="Spanish light logo at 720px"><figcaption>es</figcaption></figure>
              <figure><img class="w720" src="vanityURLs-link redirected-it-9.svg" alt="Italian light logo at 720px"><figcaption>it</figcaption></figure>
              <figure><img class="w720" src="vanityURLs-link redirected-de-9.svg" alt="German light logo at 720px"><figcaption>de</figcaption></figure>
            </div>
          </div>
        </div>
      </section>

      <section aria-labelledby="dark-heading">
        <h2 id="dark-heading">Dark SVGs</h2>
        <div class="surface dark">
          <div class="size-group">
            <div class="size-label">240px</div>
            <div class="logo-grid">
              <figure><img class="w240" src="vanityURLs-link redirected-en-dark 9.svg" alt="English dark logo at 240px"><figcaption>en</figcaption></figure>
              <figure><img class="w240" src="vanityURLs-link redirected-fr-dark 9.svg" alt="French dark logo at 240px"><figcaption>fr</figcaption></figure>
              <figure><img class="w240" src="vanityURLs-link redirected-es-dark 9.svg" alt="Spanish dark logo at 240px"><figcaption>es</figcaption></figure>
              <figure><img class="w240" src="vanityURLs-link redirected-it-dark 9.svg" alt="Italian dark logo at 240px"><figcaption>it</figcaption></figure>
              <figure><img class="w240" src="vanityURLs-link redirected-de-dark 9.svg" alt="German dark logo at 240px"><figcaption>de</figcaption></figure>
            </div>
          </div>
          <div class="size-group">
            <div class="size-label">360px</div>
            <div class="logo-grid">
              <figure><img class="w360" src="vanityURLs-link redirected-en-dark 9.svg" alt="English dark logo at 360px"><figcaption>en</figcaption></figure>
              <figure><img class="w360" src="vanityURLs-link redirected-fr-dark 9.svg" alt="French dark logo at 360px"><figcaption>fr</figcaption></figure>
              <figure><img class="w360" src="vanityURLs-link redirected-es-dark 9.svg" alt="Spanish dark logo at 360px"><figcaption>es</figcaption></figure>
              <figure><img class="w360" src="vanityURLs-link redirected-it-dark 9.svg" alt="Italian dark logo at 360px"><figcaption>it</figcaption></figure>
              <figure><img class="w360" src="vanityURLs-link redirected-de-dark 9.svg" alt="German dark logo at 360px"><figcaption>de</figcaption></figure>
            </div>
          </div>
          <div class="size-group">
            <div class="size-label">720px</div>
            <div class="logo-grid">
              <figure><img class="w720" src="vanityURLs-link redirected-en-dark 9.svg" alt="English dark logo at 720px"><figcaption>en</figcaption></figure>
              <figure><img class="w720" src="vanityURLs-link redirected-fr-dark 9.svg" alt="French dark logo at 720px"><figcaption>fr</figcaption></figure>
              <figure><img class="w720" src="vanityURLs-link redirected-es-dark 9.svg" alt="Spanish dark logo at 720px"><figcaption>es</figcaption></figure>
              <figure><img class="w720" src="vanityURLs-link redirected-it-dark 9.svg" alt="Italian dark logo at 720px"><figcaption>it</figcaption></figure>
              <figure><img class="w720" src="vanityURLs-link redirected-de-dark 9.svg" alt="German dark logo at 720px"><figcaption>de</figcaption></figure>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
