name = 'go-vanityurls'
main = 'src/worker.mjs'
compatibility_date = '2026-05-05'
workers_dev = false
preview_urls = false

[build]
command = 'npm run build'

[assets]
directory = './build'
binding = 'ASSETS'
not_found_handling = '404-page'
run_worker_first = [
  "/*",
  "!/*.css",
  "!/*.js",
  "!/*.png",
  "!/*.svg",
  "!/*.ico",
  "!/*.webmanifest",
  "!/*.xml",
  "!/fonts/*",
]

[vars]
CF_ACCESS_TEAM_DOMAIN = 'vanityurls.cloudflareaccess.com'

[[routes]]
pattern = "go.vanityurls.link"
custom_domain = true

[observability]
[observability.logs]
enabled = true
invocation_logs = true
