name = 'vanityurls-redirector'
main = 'src/worker.mjs'
compatibility_date = '2026-05-05'
workers_dev = false
preview_urls = false

[build]
command = 'npm run build'

[assets]
directory = './build'
binding = 'ASSETS'
not_found_handling = '404-page'
run_worker_first = [
  "/*",
  "!/*.css",
  "!/*.js",
  "!/*.png",
  "!/*.svg",
  "!/*.ico",
  "!/*.webmanifest",
  "!/*.txt",
  "!/*.xml",
  "!/fonts/*",
]

[vars]
UMAMI_ENDPOINT = "https://cloud.umami.is/api/send"

[[routes]]
# pattern = "your-short-domain.com"
pattern = "vanityurls.link"
custom_domain = true

[observability]
[observability.logs]
enabled = true
invocation_logs = true
